# CH7 — FULL AGENTIC CI PIPELINE
#
# Pipeline architecture:
#
#   ┌─────────────────┐
#   │  playwright     │  ← runs on every push/PR (fast, deterministic gate)
#   └────────┬────────┘
#            │ needs
#   ┌─────────▼────────────────────────────────────────────────┐
#   │  agentic (matrix)                                        │
#   │  ┌──────────────┐ ┌─────────────┐ ┌──────────────────┐   │
#   │  │ auth-redirect│ │ login-flow  │ │  product-search  │   │  ← parallel
#   │  └──────────────┘ └─────────────┘ └──────────────────┘   │
#   │  ┌──────────────┐                                        │
#   │  │full-ecommerce│  (main branch only, to manage API cost)│
#   │  └──────────────┘                                        │
#   └────────┬─────────────────────────────────────────────────┘
#            │ needs
#   ┌─────────▼────────┐
#   │  locator-health  │  ← verifies self-healing memory is current
#   └──────────────────┘

name: CI — Web Detective

on:
  # push:
  #   branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

# ── Job 1: Standard Playwright suite ──────────────────────────────────────────
jobs:
  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: npm run dev &
        env:
          NODE_ENV: test

      - name: Wait for dev server
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Run Playwright tests
        run: npx playwright test --reporter=list,html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

# ── Job 2: Agentic verification (matrix, parallel per scenario) ────────────────
  agentic:
    name: Agent / ${{ matrix.scenario }}
    runs-on: ubuntu-latest
    needs: playwright
    # Agentic runs cost API tokens — gate to main only.
    # To enable on PRs too, remove this condition or scope it with a `paths` filter.
    if: github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false       # let all matrix jobs complete even if one fails
      matrix:
        scenario:
          - auth-redirect
          - login-flow
          - product-search
          - full-ecommerce

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: npm run dev &
        env:
          NODE_ENV: test

      - name: Wait for dev server
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Run agent scenario
        id: agent
        run: |
          npx ts-node examples/ch7-agent-ci/agent-runner.ts \
            --scenario ${{ matrix.scenario }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload agent report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-report-${{ matrix.scenario }}
          path: |
            agent-report.json
            traces/
          retention-days: 14

# ── Job 3: Locator health check ────────────────────────────────────────────────
  locator-health:
    name: Locator Health
    runs-on: ubuntu-latest
    needs: playwright

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: npm run dev &
        env:
          NODE_ENV: test

      - name: Wait for dev server
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Seed and report locator memory
        run: |
          npx ts-node -e "
          const { LocatorStore, WEB_DETECTIVE_LOCATORS } = require('./examples/ch4-self-healing/locator-store')
          const store = new LocatorStore('./locator-memory.json')
          for (const [key, selector] of WEB_DETECTIVE_LOCATORS) store.register(key, selector)
          store.printReport()
          "

      - name: Upload locator memory
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: locator-memory
          path: locator-memory.json
          retention-days: 30
