# CH4.1 — Playwright Agents: Planner, Generator, Healer
#
# Validates:
#   • planner.ts and healer.ts type-check cleanly
#   • Planner produces a non-empty Markdown plan for each app route
#   • Generator emits valid TypeScript (compiles without errors)
#   • Full Planner → Generator → run pipeline passes on main branch pushes
#
# The Planner/Generator/Healer run against a local Ollama server (DeepSeek-R1)
# installed on the runner — no API key required.

name: CH4.1 — Playwright Agents

on:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'examples/ch4.1-playwright-agents/**'
  #     - 'src/**'
  #     - 'tsconfig.examples.json'
  pull_request:
    branches: [main]
    paths:
      - 'examples/ch4.1-playwright-agents/**'
      - 'src/**'
      - 'tsconfig.examples.json'

env:
  NODE_VERSION: '20'

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit -p tsconfig.examples.json

  plan-validation:
    name: Plan & Generator Validation
    runs-on: ubuntu-latest
    needs: type-check
    timeout-minutes: 30
    env:
      WORKSHOP_MODEL: deepseek-r1:1.5b

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Setup Ollama (local LLM)
        uses: ./.github/actions/setup-ollama
        with:
          model: ${{ env.WORKSHOP_MODEL }}

      - name: Start dev server
        run: npm run dev &
      - name: Wait for dev server
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Run Planner — generate test plan
        # TODO (Chapter 4.1): implement this step during the workshop.
        # Run TestPlannerAgent.plan() over /login, /dashboard and /products, then
        # assert the Markdown plan is non-empty and one snapshot per page exists.
        # Reference implementation: git checkout solutions
        run: |
          echo "TODO (Chapter 4.1): run the Planner and validate the generated plan"
          exit 1

      - name: Run Generator — emit test code
        run: |
          npx tsx -e "
            const { TestGeneratorAgent } = require('./examples/ch4.1-playwright-agents/planner')
            void (async () => {
              const generator = new TestGeneratorAgent()
              const result = await generator.generate('web-detective-ci')
              if (!result.code || result.code.trim().length < 50) {
                console.error('Generated code is too short — generator may have failed')
                process.exit(1)
              }
              if (!result.code.includes('test(')) {
                console.error('Generated code contains no test() blocks')
                process.exit(1)
              }
              console.log('Generator OK —', result.code.split('\n').length, 'lines of test code')
              if (result.selectorWarnings.length > 0) {
                console.warn('Selector warnings (', result.selectorWarnings.length, '):')
                result.selectorWarnings.forEach(w => console.warn(' !', w))
              }
            })()
          "

      - name: Compile generated tests
        run: |
          npx tsc --noEmit \
            --target ES2022 \
            --module CommonJS \
            --moduleResolution node \
            --esModuleInterop true \
            --strict false \
            --skipLibCheck true \
            tests/generated/web-detective-ci.spec.ts || true
          echo "Compilation check complete (warnings above are non-fatal for generated code)"

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ch4.1-generated
          path: |
            specs/web-detective-ci.md
            tests/generated/web-detective-ci.spec.ts
          retention-days: 7

  pipeline-e2e:
    name: Full Pipeline Smoke Test
    runs-on: ubuntu-latest
    needs: type-check
    # Local CPU inference is slow — only run on main branch pushes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 40
    env:
      WORKSHOP_MODEL: deepseek-r1:1.5b

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Setup Ollama (local LLM)
        uses: ./.github/actions/setup-ollama
        with:
          model: ${{ env.WORKSHOP_MODEL }}

      - name: Start dev server
        run: npm run dev &
      - name: Wait for dev server
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Planner + Generator
        run: npx tsx examples/ch4.1-playwright-agents/planner.ts

      - name: Run generated tests
        run: npx playwright test tests/generated/web-detective.spec.ts --reporter=list
        continue-on-error: true  # generated tests may need one healer pass

      - name: Healer pass (if tests failed)
        run: npx tsx examples/ch4.1-playwright-agents/healer.ts

      - name: Re-run after healing
        run: npx playwright test tests/generated/web-detective.spec.ts --reporter=list

      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ch4.1-pipeline
          path: |
            specs/web-detective.md
            tests/generated/web-detective.spec.ts
          retention-days: 14
