# CH7 — Implementing an Agent & Running on CI
#
# Full agentic pipeline with a parallel scenario matrix.
#
# Pipeline:
#   playwright (every push/PR)
#       └── agentic matrix (main only, parallel per scenario)
#       │       ├── auth-redirect
#       │       ├── login-flow
#       │       ├── product-search
#       │       └── full-ecommerce
#       └── locator-health (every push/PR)
#
# The agentic matrix runs against a local Ollama server (DeepSeek-R1) installed on
# the runner — no API key required.

name: CH7 — Agent CI Pipeline

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Ollama model for LLM-backed steps (WORKSHOP_MODEL)'
        required: false
        default: deepseek-r1:1.5b
      max_turns:
        description: 'Max agent reasoning turns before giving up (WORKSHOP_MAX_TURNS)'
        required: false
        default: '15'
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:

  # ── Playwright suite — fast deterministic gate ─────────────────────────────
  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: npm run dev &
        env:
          NODE_ENV: test
      - name: Wait for dev server
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Run Playwright tests
        run: npx playwright test --reporter=list,html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Agentic matrix — one job per scenario, runs in parallel ───────────────
  agentic:
    name: Agent / ${{ matrix.scenario }}
    runs-on: ubuntu-latest
    needs: playwright
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/solutions'
    timeout-minutes: 30
    env:
      WORKSHOP_MODEL: ${{ github.event.inputs.model || 'deepseek-r1:1.5b' }}
      WORKSHOP_MAX_TURNS: ${{ github.event.inputs.max_turns || '15' }}

    strategy:
      fail-fast: false
      matrix:
        scenario:
          - auth-redirect
          - login-flow
          - product-search
          - full-ecommerce

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Setup Ollama (local LLM)
        uses: ./.github/actions/setup-ollama
        with:
          model: ${{ env.WORKSHOP_MODEL }}

      - name: Start dev server
        run: npm run dev &
        env:
          NODE_ENV: test
      - name: Wait for dev server
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Run agent scenario
        run: |
          npx tsx examples/ch7-agent-ci/agent-runner.ts \
            --scenario ${{ matrix.scenario }}

      - name: Upload scenario report + traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-report-${{ matrix.scenario }}
          path: |
            agent-report.json
            traces/
          retention-days: 14

  # ── Locator health — verifies selector memory stays current ───────────────
  locator-health:
    name: Locator Health
    runs-on: ubuntu-latest
    needs: playwright

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: npm run dev &
        env:
          NODE_ENV: test
      - name: Wait for dev server
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Seed and report locator memory
        run: |
          npx tsx -e "
          const { LocatorStore, WEB_DETECTIVE_LOCATORS } = require('./examples/ch4-self-healing/locator-store')
          const store = new LocatorStore('./locator-memory.json')
          for (const [key, selector] of WEB_DETECTIVE_LOCATORS) store.register(key, selector)
          store.printReport()
          "

      - name: Upload locator memory
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: locator-memory
          path: locator-memory.json
          retention-days: 30
