# CH2 — WebdriverIO & Playwright as the Execution Layer
#
# Validates:
#   • ActionWrapper and BrowserSession type-check cleanly
#   • ActionWrapper can execute a real login flow and produce a structured log
#   • Playwright CLI commands are documented and discoverable

name: CH2 — Execution Layer

on:
  workflow_dispatch:   # allow manual runs on this start branch during the workshop
  # push:
  #   branches: [main]
  #   paths:
  #     - 'examples/ch2-execution-layer/**'
  #     - 'tsconfig.examples.json'
  pull_request:
    branches: [main]
    paths:
      - 'examples/ch2-execution-layer/**'
      - 'tsconfig.examples.json'

env:
  NODE_VERSION: '20'

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit -p tsconfig.examples.json

  action-wrapper-smoke:
    name: ActionWrapper Smoke Test
    runs-on: ubuntu-latest
    needs: type-check

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: npm run dev &
      - name: Wait for dev server
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Run ActionWrapper login flow
        # TODO (Chapter 2): implement this step during the workshop.
        # Drive a real login through ActionWrapper (navigate → fill → click →
        # assertUrl → assertVisible), print the structured log, and fail the
        # job if any wrapped action reported ok=false.
        # Reference implementation: git checkout solutions
        run: |
          echo "TODO (Chapter 2): run the ActionWrapper login flow smoke test"
          exit 1

  cli-docs-check:
    name: CLI Examples Readable
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Verify CLI cheatsheet exists and is executable
        run: |
          test -f examples/ch2-execution-layer/cli-examples.sh
          echo "CLI cheatsheet found — key commands:"
          grep '^npx playwright' examples/ch2-execution-layer/cli-examples.sh
